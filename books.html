<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
</head>
<body>
    <div>
        <ul id="booklist">

        </ul>
    </div>

    <script>
        const booklist = document.getElementById('booklist');
        
        fetch("./booklist.json")
            .then(response => response.json())
            .then(data => {
                // const container = document.getElementById("booklist");
                data.assets.forEach(file => {
                    const li = document.createElement("li");
                    bookName = file.split('/')[2].split('.pdf')[0];
                    // li.textContent = bookName;
                    li.innerHTML = `<li><a href="#" onclick="window.open('${file}')">${bookName}</a></li>`;
                    booklist.appendChild(li);
                });
            });
        
        function openPDFInBrowser(fileUrl) {
            window.open(fileUrl);
        }

    </script>
</body>
</html>
